<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - IM系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h2>用户登录</h2>
            <div id="alert"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="输入用户名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="输入密码" required>
                </div>
                <button type="submit" class="btn btn-full">登录</button>
            </form>
            <div class="auth-link">
                没有账号？<a href="/static/register.html">立即注册</a> | 
                <a href="/static/security.html">安全演示</a>
            </div>
        </div>
    </div>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/login.js"></script>
</body>
</html>
