<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - IM系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h2>用户注册</h2>
            <div id="alert"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="3-50位字母数字下划线" required>
                </div>
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="nickname" placeholder="显示名称">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="至少6位" required>
                </div>
                <button type="submit" class="btn btn-full">注册</button>
            </form>
            <div class="auth-link">
                已有账号？<a href="/static/login.html">立即登录</a>
            </div>
        </div>
    </div>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/register.js"></script>
</body>
</html>
